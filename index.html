<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">ModernShop</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Categories</a>
      <a href="#">Contact</a>
    </nav>

    <div class="cart">
      Cart (<span id="cart-count">0</span>)
    </div>
  </header>

  <section class="hero">
    <h1>Modern Shopping Experience</h1>
    <p>Discover premium products with elegant design.</p>
    <button>Shop Now</button>
  </section>

  <section class="products">

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop" alt="">
      <h3>Running Shoes</h3>
      <p>$120</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop" alt="">
      <h3>Luxury Watch</h3>
      <p>$350</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop" alt="">
      <h3>Fashion Jacket</h3>
      <p>$180</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
